<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Haven</title>
    <!-- GitHub Pages SPA fallback. Encodes the requested path into a query
         string and bounces to the app's index.html, which decodes it back.
         pathSegmentsToKeep = 1 because the app is served from /haven/. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
